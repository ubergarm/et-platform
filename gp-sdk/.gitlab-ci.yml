.tests:cmake-only:common:
  extends:
    - .pod_large
    - .template_job
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, RelWithDebInfo, Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_SETUP_EXTRA_DEPS: |
      sudo apt install ninja-build
    CMD_BUILD: |
      cd device
      mkdir build && cd build
      cmake .. -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/device/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DADDRESS:STRING=0x8005b35000 -DCMAKE_C_COMPILER=riscv64-unknown-elf-gcc -DCMAKE_CXX_COMPILER=riscv64-unknown-elf-g++ -DCMAKE_ASM_COMPILER=riscv64-unknown-elf-gcc -DUSE_CONAN=ON
      cmake --build .
      cd ../..

      cd host
      mkdir build && cd build
      cmake .. -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/host/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DUSE_CONAN=ON -G Ninja
      cmake --build .
      cd ../..

    CMD_POST_BUILD: |
      export ET_SDK_HOME=/usr/local/esperanto
      source ${ET_SDK_HOME}/.builds/device/conanbuild.sh
      source ${ET_SDK_HOME}/.builds/host/conanrun.sh
      
      if [ "$BUILD_TYPE" == "Debug" ]; then
        echo "Skip testing when building in Debug"
      else

        cd host/build
        ./sdk/basic_launcher -kernel_path=../../device/build/tests/print.elf -device-type=${DEVICE_TYPE}
        if [ $? -ne 0 ]; then
          echo "Error at print"
        fi
        dt2json traceKernels_dev0_0.bin -t

        ./sdk/basic_launcher -kernel_path=../../device/build/tests/print2.elf -device-type=${DEVICE_TYPE}
        if [ $? -ne 0 ]; then
          echo "Error at print2"
        fi     
        dt2json traceKernels_dev0_0.bin -t

        ./sdk/basic_launcher -kernel_path=../../device/build/tests/bss.elf -device-type=${DEVICE_TYPE}
        if [ $? -ne 0 ]; then
          echo "Error at bss"
        fi      
        dt2json traceKernels_dev0_0.bin -t

        ./sdk/basic_launcher -kernel_path=../../device/build/tests/data.elf -device-type=${DEVICE_TYPE}
        if [ $? -ne 0 ]; then
          echo "Error at data"
        fi      
        dt2json traceKernels_dev0_0.bin -t

        ./sdk/fft_launcher -kernel_path=../../device/build/tests/fftKernel.elf -device-type=${DEVICE_TYPE}
        if [ $? -ne 0 ]; then
          echo "Error at fftkernel"
        fi
        dt2json traceKernels_dev0_0.bin -t
      
        #
        # Add more testes here
        #

      fi

tests:cmake-only:sw-sysemu:
  extends:
    - .tests:cmake-only:common
  image: ${ET_SW_DEVELOP_DOCKER_IMAGE}
  variables:
    DEVICE_TYPE: sysemu


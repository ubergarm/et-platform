include:
  - project: 'esperantotech/software/gitlab-ci-common'
    ref: 98b1c375911297a65e227ce0c45e73140ea125f5
    file:
      - rules/generic-workflow-conan.yaml
      - pods/large-pod.yaml
      - jobs/generic-k8s-job.yaml
      - rules/exec_maybe_interactively.yaml
  - project: 'esperantotech/software/gitlab-ci-common'
    ref: master
    file:
      - 'jobs/conan-jobs.yaml'

stages:
  - codequality
  - test
  
default:
  interruptible: true


variables:
  ET_SW_DEVELOP_DOCKER_IMAGE:
    value: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-et-sw-develop-stack:1.2.0rC2-21931aed0f091dee5e9c43a27d59337b5e614eee
# Only run job in these cases:
# - if it's a tag pipeline
# - if there is a commit pushed or merged to the default branch (pre-release)
.release_job:
  rules:
    - &release_job_rule
      if: $CI_COMMIT_TAG || ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)

# Only run job in these cases:
# - if it's a tag pipeline
# - if there is a commit pushed or merged to the default branch (pre-release)
# - if there is a MR open (pre-release, unstable)
.release_or_development_job:
  rules:
    - &release_or_development_job_rule
      if: $CI_COMMIT_TAG || ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH) || ($CI_PIPELINE_SOURCE == "merge_request_event")

# Only run job in these cases:
# - if there is a MR open
.development_job:
  rules:
    - &development_job_rule
      if: ($CI_PIPELINE_SOURCE == "merge_request_event") && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH)

build:sonarqube-check:
  extends:
    - .pod_large
  stage: codequality
  image: '${ET_SW_DEVELOP_DOCKER_IMAGE}'
  needs: []
  tags:
    - k8s
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event") && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH)
      allow_failure: true # TODO: change to 'false' once analysis are verified correct & stable
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
    - if: $CI_COMMIT_TAG
      allow_failure: true
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    SONAR_BUILD_WRAPPER_URL: "https://sc-sonarq01.esperanto.ai/static/cpp"
    SONAR_SCANNER_URL: "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli"
    SONAR_SCANNER_ARCHIVE_NAME: "sonar-scanner-cli-4.8.0.2856-linux.zip"
    SONAR_SCANNER_UNZIPED_NAME: "sonar-scanner-4.8.0.2856-linux"
    SONAR_BUILD_WRAPPER: "build-wrapper-linux-x86"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  before_script:
    - sudo apt-get update -qq
    - sudo apt-get install -qq -y --no-install-recommends zip unzip
    - wget ${SONAR_BUILD_WRAPPER_URL}/${SONAR_BUILD_WRAPPER}.zip
    - unzip ${SONAR_BUILD_WRAPPER}.zip
    - wget ${SONAR_SCANNER_URL}/${SONAR_SCANNER_ARCHIVE_NAME}
    - unzip ${SONAR_SCANNER_ARCHIVE_NAME}
    - export PATH=$PATH:$PWD/${SONAR_BUILD_WRAPPER}:$PWD/${SONAR_SCANNER_UNZIPED_NAME}/bin
    - export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$PWD/${SONAR_BUILD_WRAPPER}:$PWD/${SONAR_SCANNER_UNZIPED_NAME}/lib
  script:
    - source ${ET_SDK_HOME}/.builds/device/conanbuild.sh
    - cmake -S device -B .ci/sonarqube/build_device -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/device/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DADDRESS:STRING=0x8005b35000 -DUSE_CONAN=ON -G "Unix Makefiles"
    - cmake -S host -B .ci/sonarqube/build_host -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/host/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DUSE_CONAN=ON -G "Unix Makefiles"
    - build-wrapper-linux-x86-64 --out-dir build_wrapper_output_directory make -C .ci/sonarqube/ clean all
    - sonar-scanner

###############################################################################
###############################################################################
###############################################################################

.tests:common:
  extends:
    - .pod_large
    - .template_job
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    ET_SDK_HOME: /usr/local/esperanto
    KERNEL_ADDRESS: 0x8005b35000
    JUNIT_REPORT: report.xml
    TEMP_DIR: temp
    PYTEST_OPTIONS: --log-cli-level=DEBUG --tb=short -q
    DEVICE_BUILD_PATH: device/build/Release
    HOST_BUILD_PATH: host/build/$BUILD_TYPE
    # DEVICE_TYPE: type of execution (silicon or sysemu)

    CMD_SETUP_EXTRA_DEPS: |
      sudo apt install ninja-build
    CMD_POST_BUILD: |
      echo $$PATH
      echo $$LD_LIBRARY_PATH
      source ${ET_SDK_HOME}/.builds/device/conanbuild.sh
      source ${ET_SDK_HOME}/.builds/host/conanrun.sh

      if [ "$BUILD_TYPE" == "Debug" ]; then
        echo "Skip testing when building in Debug"
      else
        python3 -m pytest ci -k "(artifacts or $DEVICE_TYPE)" --skip-gdb --basetemp=$$TEMP_DIR --junitxml=$$JUNIT_REPORT $$PYTEST_OPTIONS --device-build=$$DEVICE_BUILD_PATH --host-build=$$HOST_BUILD_PATH
      fi
  artifacts:
    when: always
    paths:
      - $$JUNIT_REPORT
      - $$TEMP_DIR
    expire_in: 1 day
    reports:
      junit: $$JUNIT_REPORT


###############################################################################
###############################################################################
###############################################################################

.tests:conan:common:
  extends:
    - .pod_large
    - .template_job
    - .tests:common
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, Debug ]
  variables:
    TIMEOUT: 2h

    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      echo $$PATH
      echo $$LD_LIBRARY_PATH 
      cp ${ET_SDK_HOME}/.conanfiles/conanfile_device.txt device/conanfile.txt
      echo -e "\n[layout]" >> device/conanfile.txt
      echo -e "\ncmake_layout" >> device/conanfile.txt
      
      cp ${ET_SDK_HOME}/.conanfiles/conanfile_host.txt host/conanfile.txt
      echo -e "\n[layout]" >> host/conanfile.txt
      echo -e "\ncmake_layout" >> host/conanfile.txt
      
      conan lock create device/conanfile.txt -pr:b linux-ubuntu18.04-x86_64-gcc7-release -pr:h baremetal-rv64-gcc8.2-release --build missing --lockfile-out device.lock
      conan lock build-order device.lock --json build-order-device.json
      
      conan lock create host/conanfile.txt -pr:b linux-ubuntu18.04-x86_64-gcc7-release -pr:h linux-ubuntu18.04-x86_64-gcc7-$${BUILD_TYPE_LOWER} --build missing --lockfile-out host.lock
      conan lock build-order host.lock --json build-order-host.json
      
      conan install device/conanfile.txt --lockfile device.lock --build missing -if device/build
      conan install host/conanfile.txt --lockfile host.lock --build missing -if host/build
      if [[ $(< build-order-device.json) != "[]" || $(< build-order-host.json) != "[]" ]]; then
        conan user ${ARTIFACTORY_USER} -p ${ARTIFACTORY_PASSWORD} --remote conan-tmp
        conan upload "*" --all --check --confirm --retry 5 --retry-wait 120 --parallel -r conan-tmp
        if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
          conan user ${ARTIFACTORY_USER} -p ${ARTIFACTORY_PASSWORD} --remote conan-develop
          conan upload "*" --all --check --confirm --retry 5 --retry-wait 120 --parallel -r conan-develop
        fi
      fi
      
      cd device
      source build/Release/generators/conanbuild.sh
      cmake --preset release -DADDRESS:STRING=$${KERNEL_ADDRESS} -DUSE_CONAN=ON -G "Unix Makefiles"
      cmake --build --preset release
      cd ..

      cd host
      cmake --preset $${BUILD_TYPE_LOWER} -DUSE_CONAN=ON -G Ninja
      cmake --build --preset $${BUILD_TYPE_LOWER}
      cd ..

tests:conan:sw-sysemu:
  extends:
    - .tests:conan:common
  image: ${ET_SW_DEVELOP_DOCKER_IMAGE}
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: sysemu


.tests:cmake-only:common:
  extends:
    - .pod_large
    - .template_job
    - .tests:common
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, RelWithDebInfo, Debug ]
  variables:
    TIMEOUT: 2h

    CMD_BUILD: |      
      mkdir -p $$DEVICE_BUILD_PATH
      source ${ET_SDK_HOME}/.builds/device/conanbuild.sh
      cmake -B$$DEVICE_BUILD_PATH -DCMAKE_TOOLCHAIN_FILE=${ET_SDK_HOME}/.builds/device/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DADDRESS:STRING=$${KERNEL_ADDRESS} -DUSE_CONAN=ON device
      cmake --build $$DEVICE_BUILD_PATH

      mkdir -p $$HOST_BUILD_PATH
      cmake -B$$HOST_BUILD_PATH -DCMAKE_TOOLCHAIN_FILE=${ET_SDK_HOME}/.builds/host/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DUSE_SANITIZER=AddrAndLeaks -DUSE_CONAN=ON -G Ninja host
      cmake --build $$HOST_BUILD_PATH

tests:cmake-only:silicon:
  extends:
    - .tests:cmake-only:common
  image:
    name: ${ET_SW_DEVELOP_DOCKER_IMAGE}
    entrypoint: [""]
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: silicon
  parallel:
    matrix:
      - BUILD_TYPE: [ Release ]
  tags:
    - silicon
    - 1-card-silicon
    - mv-gb-swci01
  
tests:cmake-only:sw-sysemu:
  extends:
    - .tests:cmake-only:common
  image: ${ET_SW_DEVELOP_DOCKER_IMAGE}
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: sysemu

include:
  - project: 'esperantotech/software/gitlab-ci-common'
    ref: 9e27d5abc3e4538cf5ee705d0263ea3d415e6ef1
    file:
      - rules/generic-workflow-conan.yaml
      - pods/large-pod.yaml
      - jobs/generic-k8s-job.yaml
      - rules/exec_maybe_interactively.yaml
      - jobs/conan-sonarqube-job.yaml
  - project: 'esperantotech/software/gitlab-ci-common'
    ref: master
    file:
      - 'jobs/conan-jobs.yaml'

stages:
  - codequality
  - test
  
default:
  interruptible: true


variables:
  ET_SW_DEVELOP_DOCKER_IMAGE:
    value: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-22.04-et-sw-develop-stack:1.6.39
# Only run job in these cases:
# - if it's a tag pipeline
# - if there is a commit pushed or merged to the default branch (pre-release)
.release_job:
  rules:
    - &release_job_rule
      if: $CI_COMMIT_TAG || ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)

# Only run job in these cases:
# - if it's a tag pipeline
# - if there is a commit pushed or merged to the default branch (pre-release)
# - if there is a MR open (pre-release, unstable)
.release_or_development_job:
  rules:
    - &release_or_development_job_rule
      if: $CI_COMMIT_TAG || ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH) || ($CI_PIPELINE_SOURCE == "merge_request_event")

# Only run job in these cases:
# - if there is a MR open
.development_job:
  rules:
    - &development_job_rule
      if: ($CI_PIPELINE_SOURCE == "merge_request_event") && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH)

build:sonarqube-check:
  extends:
    - .pod_large
    - .template_sonarqube_conan_job
  stage: codequality
  image: '${ET_SW_DEVELOP_DOCKER_IMAGE}'
  needs: []
  rules:
    - *release_or_development_job_rule
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event") && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH)
      allow_failure: true # TODO: change to 'false' once analysis are verified correct & stable
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
    - if: $CI_COMMIT_TAG
      allow_failure: true
  script:
    - conan lock create conanfile.py -pr:b=default -pr:h=linux-ubuntu22.04-x86_64-gcc11-release-shared --build=missing --lockfile=deps_base.lock --lockfile-out=Release.lock
    - conan install . --lockfile=Release.lock --build=missing -g VirtualRunEnv
    - cmake -S . -B build/Release -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -G Ninja 
    - source build/Release/generators/conanrun.sh
    - cp ${CI_PROJECT_DIR}/build/Release/compile_commands.json .
    - sonar-scanner -Dsonar.cfamily.threads=${KUBERNETES_CPU_REQUEST}

###############################################################################
###############################################################################
###############################################################################

.tests:common:
  extends:
    - .pod_large
    - .template_job
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    ET_SDK_HOME: /usr/local/esperanto
    KERNEL_ADDRESS: 0x8005b35000
    JUNIT_REPORT: report.xml
    TEMP_DIR: temp
    CI_ARTIFACTS: >-
      $$TEMP_DIR
      ./host/build
      ./device/build
    PYTEST_OPTIONS: --log-cli-level=DEBUG --tb=short -q
    DEVICE_BUILD_PATH: device/build/Release
    HOST_BUILD_PATH: host/build/$BUILD_TYPE
    # DEVICE_TYPE: type of execution (silicon or sysemu)

    CMD_SETUP_EXTRA_DEPS: |
      sudo apt install ninja-build
    CMD_POST_BUILD: |
      echo $$PATH
      echo $$LD_LIBRARY_PATH
    CMD_SCRIPT: |

      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')

      if [ $JOB_TYPE == "conan" ]; then
        source host/build/${BUILD_TYPE}/generators/conanrun.sh
      else
        source ${ET_SDK_HOME}/.builds/host/conanrunenv-$${BUILD_TYPE_LOWER}-x86_64.sh
      fi

      if [ "$BUILD_TYPE" == "Debug" ]; then
        echo "Skip testing when building in Debug"
      else
        python3 -m pytest ci -k "(artifacts or $DEVICE_TYPE)" --skip-gdb --basetemp=$$TEMP_DIR --junitxml=$$JUNIT_REPORT $$PYTEST_OPTIONS --device-build=$$DEVICE_BUILD_PATH --host-build=$$HOST_BUILD_PATH
      fi

  artifacts:
    when: always
    paths:
      - report.xml
      - temp
    expire_in: 1 day
    reports:
      junit: report.xml


###############################################################################
###############################################################################
###############################################################################

.tests:conan:common:
  extends:
    - .pod_large
    - .template_job
    - .tests:common
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, Debug ]
        DEV_COMPILER: [gcc8.2]
  variables:
    TIMEOUT: 2h

    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      echo $$PATH
      echo $$LD_LIBRARY_PATH 
      cp ${ET_SDK_HOME}/.conanfiles/conanfile_device.txt device/conanfile.txt
      echo -e "\n[layout]" >> device/conanfile.txt
      echo -e "\ncmake_layout" >> device/conanfile.txt
      
      cp ${ET_SDK_HOME}/.conanfiles/conanfile_host.txt host/conanfile.txt
      echo -e "\n[layout]" >> host/conanfile.txt
      echo -e "\ncmake_layout" >> host/conanfile.txt
      
      conan lock create device/conanfile.txt -pr:b linux-ubuntu22.04-x86_64-gcc11-release -pr:h baremetal-rv64-gcc8.2-release --build missing --lockfile-out device.lock
      conan lock build-order device.lock --json build-order-device.json
      
      conan lock create host/conanfile.txt -pr:b linux-ubuntu22.04-x86_64-gcc11-release -pr:h linux-ubuntu22.04-x86_64-gcc11-$${BUILD_TYPE_LOWER}-shared --build missing --lockfile-out host.lock
      conan lock build-order host.lock --json build-order-host.json
      
      conan install device/conanfile.txt --lockfile device.lock --build missing -if device/build
      conan install host/conanfile.txt --lockfile host.lock --build missing -if host/build
      if [[ $(< build-order-device.json) != "[]" || $(< build-order-host.json) != "[]" ]]; then
        conan user ${ARTIFACTORY_USER} -p ${ARTIFACTORY_PASSWORD} --remote conan-tmp
        conan upload "*" --all --check --confirm --retry 5 --retry-wait 120 --parallel -r conan-tmp
        if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
          conan user ${ARTIFACTORY_USER} -p ${ARTIFACTORY_PASSWORD} --remote conan-develop
          conan upload "*" --all --check --confirm --retry 5 --retry-wait 120 --parallel -r conan-develop
        fi
      fi
      
      cd device
      source build/Release/generators/conanbuild.sh
      cmake --preset release -DADDRESS:STRING=$${KERNEL_ADDRESS} -G "Unix Makefiles"
      cmake --build --preset release
      source build/Release/generators/deactivate_conanbuild.sh
      cd ..

      cd host
      cmake --preset $${BUILD_TYPE_LOWER} -G Ninja
      cmake --build --preset $${BUILD_TYPE_LOWER}
      cd ..

  artifacts:
    when: always
    paths:
      - device.lock
      - host.lock
      - report.xml
      - temp
    expire_in: 1 day
    reports:
      junit: report.xml

tests:conan:sw-sysemu:
  extends:
    - .tests:conan:common
  image: ${ET_SW_DEVELOP_DOCKER_IMAGE}
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: sysemu
    JOB_TYPE: "conan"


.tests:cmake-only:common:
  extends:
    - .pod_large
    - .template_job
    - .tests:common
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, RelWithDebInfo, Debug ]
        DEV_COMPILER: [gcc8.2, clang11]
  variables:
    TIMEOUT: 2h

    CMD_BUILD: |      
      mkdir -p $$DEVICE_BUILD_PATH
      source ${ET_SDK_HOME}/.builds/device/${DEV_COMPILER}/conanbuild.sh
      cmake -B$$DEVICE_BUILD_PATH -DCMAKE_TOOLCHAIN_FILE=${ET_SDK_HOME}/.builds/device/${DEV_COMPILER}/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DADDRESS:STRING=$${KERNEL_ADDRESS} device
      cmake --build $$DEVICE_BUILD_PATH
      
      mkdir -p $$HOST_BUILD_PATH
      cmake -B$$HOST_BUILD_PATH -DCMAKE_TOOLCHAIN_FILE=${ET_SDK_HOME}/.builds/host/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DUSE_SANITIZER=AddrAndLeaks -G Ninja host
      cmake --build $$HOST_BUILD_PATH

tests:cmake-only:silicon:
  extends:
    - .tests:cmake-only:common
  image:
    name: ${ET_SW_DEVELOP_DOCKER_IMAGE}
    entrypoint: [""]
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: silicon
    JOB_TYPE: "cmake-only"
  parallel:
    matrix:
      - BUILD_TYPE: [ Release ]
        DEV_COMPILER: [gcc8.2, clang11]
     
  tags:
    - silicon
    - 1-card-silicon
    - mv-gb-swci01
  
tests:cmake-only:sw-sysemu:
  extends:
    - .tests:cmake-only:common
  image: ${ET_SW_DEVELOP_DOCKER_IMAGE}
  rules:
    - *development_job_rule
  variables:
    DEVICE_TYPE: sysemu
    JOB_TYPE: "cmake-only"

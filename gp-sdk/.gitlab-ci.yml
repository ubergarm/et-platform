include:
  - project: 'software/gitlab-ci-common'
    ref: 65f50069493bf125f770dc052b0a90b8be2d305c
    file:
      - rules/generic-workflow-conan.yaml
      - pods/large-pod.yaml
      - jobs/generic-k8s-job.yaml
      - rules/exec_maybe_interactively.yaml
  - project: 'software/gitlab-ci-common'
    ref: master
    file:
      - 'jobs/conan-jobs.yaml'

stages:
  - test
  
default:
  interruptible: true


###############################################################################
###############################################################################
###############################################################################

.tests:conan:common:
  extends:
    - .pod_large
    - .template_job
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_SETUP_EXTRA_DEPS: |
      sudo apt install ninja-build
    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      cd device
      conan install . -pr:b default -pr:h baremetal-rv64-gcc8.2-release --remote conan-develop --build missing
      source build/generators/conanbuild.sh
      cmake --preset release -DADDRESS:STRING=0x8005b35000 -DCMAKE_C_COMPILER=riscv64-unknown-elf-gcc -DCMAKE_CXX_COMPILER=riscv64-unknown-elf-g++ -DCMAKE_ASM_COMPILER=riscv64-unknown-elf-gcc -DUSE_CONAN=ON
      cmake --build --preset release
      cd ..

      cd host
      conan install .  -pr:b default -pr:h linux-ubuntu18.04-x86_64-gcc7-${BUILD_TYPE_LOWER} --update --remote conan-develop --build missing
      cmake --preset ${BUILD_TYPE_LOWER} -G Ninja
      cmake --build --preset ${BUILD_TYPE_LOWER}
      cd ..

    CMD_POST_BUILD: |
      cd host/build
      ./${BUILD_TYPE}/sdk/basic_launcher -kernel_path=../../device/build/Release/tests/print2/print2 -device-type=${DEVICE_TYPE}
      dt2json traceKernels_dev0_0.bin -t

tests:conan:sw-sysemu:
  extends:
    - .tests:conan:common
  image: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-gcc7-conan:0.5.6
  variables:
    DEVICE_TYPE: sysemu

tests:conan:silicon:
  extends:
    - .tests:conan:common
  image:
    name: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-gcc7-conan:0.5.6
    entrypoint: [""]
  tags:
    - silicon
    - mv-eap03
  variables:
    DEVICE_TYPE: silicon
  allow_failure: true

.tests:cmake-only:common:
  extends:
    - .pod_large
    - .template_job
  stage: test
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, RelWithDebInfo, Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_SETUP_EXTRA_DEPS: |
      sudo apt install ninja-build
    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      cd device
      mkdir build && cd build
      cmake .. -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/device/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DADDRESS:STRING=0x8005b35000 -DCMAKE_C_COMPILER=riscv64-unknown-elf-gcc -DCMAKE_CXX_COMPILER=riscv64-unknown-elf-g++ -DCMAKE_ASM_COMPILER=riscv64-unknown-elf-gcc -DUSE_CONAN=ON
      cmake --build .
      cd ../..

      cd host
      mkdir build && cd build
      cmake .. -DCMAKE_TOOLCHAIN_FILE=/usr/local/esperanto/.builds/host/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -G Ninja
      cmake --build .
      cd ../..

    CMD_POST_BUILD: |
      cd host/build
      ./sdk/basic_launcher -kernel_path=../../device/build/tests/print2/print2 -device-type=${DEVICE_TYPE}
      dt2json traceKernels_dev0_0.bin -t

tests:cmake-only:sw-sysemu:
  extends:
    - .tests:cmake-only:common
  image: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-et-sw-develop-stack:0.1.0
  variables:
    DEVICE_TYPE: sysemu

tests:cmake-only:silicon:
  extends:
    - .tests:cmake-only:common
  image:
    name: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-et-sw-develop-stack:0.1.0
    entrypoint: [""]
  tags:
    - silicon
    - mv-eap03
  variables:
    DEVICE_TYPE: silicon
  allow_failure: true

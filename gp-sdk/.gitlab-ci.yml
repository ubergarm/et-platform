include:
  - project: 'software/gitlab-ci-common'
    ref: 65f50069493bf125f770dc052b0a90b8be2d305c
    file:
      - rules/generic-workflow-conan.yaml
      - pods/large-pod.yaml
      - jobs/generic-k8s-job.yaml
      - rules/exec_maybe_interactively.yaml
  - project: 'software/gitlab-ci-common'
    ref: master
    file:
      - 'jobs/conan-jobs.yaml'

stages:
  - build
  - test
  - package
  - dist
  
default:
  interruptible: true


###############################################################################
###############################################################################
###############################################################################

# Smoke job that:
# - compiles device kernels
# - compiles host tools & executes host unit-tests in Release/Debug to capture problems early
build:
  extends:
    - .pod_large
    - .template_job
    - .template-conan-linux-ubuntu18.04-gcc7
  stage: build
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      sudo apt install ninja-build
      cd device
      conan install . -pr:b default -pr:h baremetal-rv64-gcc8.2-release --remote conan-develop --build missing
      source build/generators/conanbuild.sh
      cmake --preset release -DADDRESS:STRING=0x8005b35000 -DCMAKE_C_COMPILER=riscv64-unknown-elf-gcc -DCMAKE_CXX_COMPILER=riscv64-unknown-elf-g++ -DCMAKE_ASM_COMPILER=riscv64-unknown-elf-gcc -DUSE_CONAN=ON
      cmake --build --preset release
      cd -

      cd host
      conan install .  -pr:b default -pr:h linux-ubuntu18.04-x86_64-gcc7-${BUILD_TYPE_LOWER} --update --remote conan-develop --build missing
      cmake --preset ${BUILD_TYPE_LOWER} -G Ninja
      cmake --build --preset ${BUILD_TYPE_LOWER}

# same as 'bulid' job + execute a kernel in a silicon machine
tests:silicon:
  extends:
    - .pod_large
    - .template_job
  stage: test
  image:
    name: docker-sw-team.sc-artifactory1.esperanto.ai/convoke/ubuntu-18.04-gcc7-conan:0.5.6
    entrypoint: [""]
  tags:
    - silicon
    - mv-eap03
  parallel:
    matrix:
      - BUILD_TYPE: [ Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      sudo apt install ninja-build
      cd device
      conan install . -pr:b default -pr:h baremetal-rv64-gcc8.2-release --remote conan-develop
      source build/generators/conanbuild.sh
      cmake --preset release -DADDRESS:STRING=0x8005b35000 -DCMAKE_C_COMPILER=riscv64-unknown-elf-gcc -DCMAKE_CXX_COMPILER=riscv64-unknown-elf-g++ -DCMAKE_ASM_COMPILER=riscv64-unknown-elf-gcc -DUSE_CONAN=ON
      cmake --build --preset release
      cd -

      cd host
      conan install .  -pr:b default -pr:h linux-ubuntu18.04-x86_64-gcc7-${BUILD_TYPE_LOWER} --update --remote conan-develop --build missing
      cmake --preset ${BUILD_TYPE_LOWER} -G Ninja
      cmake --build --preset ${BUILD_TYPE_LOWER}

      ./build/${BUILD_TYPE}/sdk/basic_launcher -kernel_path=../device/build/Release/tests/print2/print2 -device-type=silicon
      conan install trace-utils/0.6.0@ -pr:b default -pr:h linux-ubuntu18.04-x86_64-gcc7-release --remote conan-develop --build missing -o trace-utils:with_cereal=False -g VirtualRunEnv
      source conanrun.sh
      dt2json traceKernels_dev0.bin -t
  allow_failure: true

# generate sdk packages 
# - we'll generate packages directly to conan-develop skiping conan-tmp -> conan-develop promotion
package:
  extends:
    - .pod_large
    - .template_job
    - .template-conan-linux-ubuntu18.04-gcc7
  stage: package
  parallel:
    matrix:
      - BUILD_TYPE: [ Release, Debug ]
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_BUILD: |
      sudo apt install ninja-build
      cd host
      conan lock create conanfile.py -pr:b default -pr:h linux-ubuntu18.04-x86_64-gcc7-release --build missing --lockfile-out gp-sdk-host.lock
      conan create . --build missing --lockfile gp-sdk-host.lock --lockfile-out ../gp-sdk-host.lock
      conan user ${CONAN_LOGIN_USERNAME} -p ${CONAN_PASSWORD} -r conan-develop
      conan upload gp-sdk-host/* --all --check --confirm --parallel --retry 5 --retry-wait 120 -r conan-develop
  artifacts:
    expire_in: 1d
    paths:
      - gp-sdk-host.lock

# create tarballs
dist-tarball:
  extends:
    - .pod_large
    - .template_job
    - .template-conan-linux-ubuntu18.04-gcc7
  stage: dist
  needs:
    - package
  variables:
    KUBERNETES_MEMORY_LIMIT: 16Gi
    TIMEOUT: 2h
    CMD_BUILD: |
      BUILD_TYPE_LOWER=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')
      sudo apt install ninja-build
      ./create-sdk-tarball.sh
  artifacts:
    expire_in: 1d 
    paths:
      - gp-sdk-0.1.0.tar.gz
